<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Klausur-Trainer · TheoInf II">
  <title>Klausur-Trainer · TheoInf II</title>

  <!-- Hintergrund: stark gerundetes Quadrat (rx/ry = 22% der Kantenlaenge), flat #7C3AED.
       width/height/rx in Prozent -> skaliert vollstaendig mit der viewBox, keine festen Pixel. -->
  <rect x="0" y="0" width="100%" height="100%" rx="22%" ry="22%" fill="#7C3AED"/>

  <!-- Symbol: Griechisches Sigma (Σ) als geometrischer Pfad.
       Bewusst als <path> statt <text>, damit es OHNE Font-Abhaengigkeit ueberall
       identisch und scharf rendert (z. B. bei der Rasterung mit sharp/librsvg,
       wo System-Fonts oft fehlen). Koordinaten liegen im viewBox-Raum (0..512)
       und skalieren daher relativ mit. -->
  <path d="M 384 128 L 128 128 L 256 256 L 128 384 L 384 384"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="56"
        stroke-linejoin="round"
        stroke-linecap="round"/>
</svg>
